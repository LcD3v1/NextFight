name: nextfight

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXTFIGHT_ENV: ${NEXTFIGHT_ENV:-local}
      NEXTFIGHT_LOG_LEVEL: ${NEXTFIGHT_LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nextfight}:${POSTGRES_PASSWORD:-local-nextfight-password}@postgres:5432/${POSTGRES_DB:-nextfight}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - nextfight

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextfight}
      POSTGRES_USER: ${POSTGRES_USER:-nextfight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-nextfight-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - nextfight

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - nextfight

volumes:
  postgres_data:
  redis_data:

networks:
  nextfight:
    driver: bridge
